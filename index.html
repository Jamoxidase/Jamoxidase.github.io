<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Fractal Zoom</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: black;
    }
    canvas {
        border: 1px solid white;
    }
</style>
</head>
<body>
<canvas id="fractalCanvas" width="800" height="600"></canvas>
<script>
    const canvas = document.getElementById('fractalCanvas');
    const ctx = canvas.getContext('2d');
    
    // Set initial zoom and position
    let zoom = 1;
    let offsetX = -0.5;
    let offsetY = 0;
    
    function drawMandelbrot() {
        const maxIterations = 100;
        const w = canvas.width;
        const h = canvas.height;
        const imageData = ctx.createImageData(w, h);
        const data = imageData.data;
        const aspectRatio = w / h;
        
        for (let x = 0; x < w; x++) {
            for (let y = 0; y < h; y++) {
                const zx = (x - w / 2) / (0.5 * zoom * w) + offsetX;
                const zy = (y - h / 2) / (0.5 * zoom * h) + offsetY;
                let a = zx;
                let b = zy;
                let n = 0;
                while (n < maxIterations && a * a + b * b < 4) {
                    const temp = a * a - b * b + zx;
                    b = 2 * a * b + zy;
                    a = temp;
                    n++;
                }
                const red = n % 256;
                const green = (n * 3) % 256;
                const blue = (n * 5) % 256;
                const index = (y * w + x) * 4;
                data[index] = red;
                data[index + 1] = green;
                data[index + 2] = blue;
                data[index + 3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }
    
    function animate() {
        zoom *= 0.99; // Adjust the zoom level
        drawMandelbrot();
        requestAnimationFrame(animate);
    }
    
    animate();
</script>
</body>
</html>
