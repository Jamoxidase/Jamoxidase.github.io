<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Mandelbrot Fractal Zoom</title>
<style>
    body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: black;
    }
    canvas {
        border: 1px solid white;
    }
</style>
</head>
<body>
<canvas id="fractalCanvas" width="800" height="600"></canvas>
<script>
    const canvas = document.getElementById('fractalCanvas');
    const ctx = canvas.getContext('2d');
    
    let zoom = 1;
    let offsetX = -0.5;
    let offsetY = 0;
    let renderingQueue = []; // Queue for rendering tasks
    
    function drawMandelbrot() {
        const maxIterations = 100;
        const w = canvas.width;
        const h = canvas.height;
        const imageData = ctx.createImageData(w, h);
        const data = imageData.data;
        const aspectRatio = w / h;
        
        for (let x = 0; x < w; x++) {
            for (let y = 0; y < h; y++) {
                const zx = (x - w / 2) / (0.5 * zoom * w) + offsetX;
                const zy = (y - h / 2) / (0.5 * zoom * h) + offsetY;
                let a = zx;
                let b = zy;
                let n = 0;
                while (n < maxIterations && a * a + b * b < 4) {
                    const temp = a * a - b * b + zx;
                    b = 2 * a * b + zy;
                    a = temp;
                    n++;
                }
                const red = n % 256;
                const green = (n * 3) % 256;
                const blue = (n * 5) % 256;
                const index = (y * w + x) * 4;
                data[index] = red;
                data[index + 1] = green;
                data[index + 2] = blue;
                data[index + 3] = 255;
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }
    
    function renderNext() {
        if (renderingQueue.length > 0) {
            const task = renderingQueue.shift(); // Get the next rendering task
            offsetX = task.offsetX;
            offsetY = task.offsetY;
            zoom = task.zoom;
            drawMandelbrot();
            requestAnimationFrame(renderNext);
        }
    }
    
    function queueRendering(z, x, y) {
        // Add the rendering task to the queue
        renderingQueue.push({ zoom: z, offsetX: x, offsetY: y });
        if (renderingQueue.length === 1) {
            // Start rendering loop if queue was empty
            renderNext();
        }
    }
    
    function handleZoom(event) {
        const zoomFactor = event.deltaY > 0 ? 1.1 : 0.9;
        const mouseX = event.clientX - canvas.offsetLeft;
        const mouseY = event.clientY - canvas.offsetTop;
        const newX = (mouseX - canvas.width / 2) / (0.5 * zoom * canvas.width) + offsetX;
        const newY = (mouseY - canvas.height / 2) / (0.5 * zoom * canvas.height) + offsetY;
        zoom *= zoomFactor;
        offsetX = newX - (mouseX - canvas.width / 2) / (0.5 * zoom * canvas.width);
        offsetY = newY - (mouseY - canvas.height / 2) / (0.5 * zoom * canvas.height);
        queueRendering(zoom, offsetX, offsetY); // Queue the rendering task
    }
    
    canvas.addEventListener('wheel', handleZoom);
    
    drawMandelbrot();
</script>
</body>
</html>
